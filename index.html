<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activador de Capital Humano — Test de Potencial</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f8f6; color: #262626; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    input { font-family: inherit; font-size: 15px; padding: 12px 16px; border: 1px solid #e5e5e0; border-radius: 8px; width: 100%; outline: none; background: #fff; color: #262626; transition: border-color 0.2s; margin-bottom: 12px; }
    input:focus { border-color: #737373; }
    button { font-family: inherit; cursor: pointer; transition: all 0.2s ease; }
    a { color: inherit; text-decoration: none; }
    .premium-blur { filter: blur(5px); opacity: 0.3; pointer-events: none; user-select: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const ACCESS_CODE = "AMAN2026";

const COLORS = {
  empatia:     { bg: "#fcf8f5", border: "#dfcfc4", text: "#4a3b32", accent: "#705c51", badge: "#eedfd5" }, 
  analitico:   { bg: "#f4f5f6", border: "#cbd5e1", text: "#1e293b", accent: "#475569", badge: "#e2e8f0" }, 
  comunicador: { bg: "#fafaf9", border: "#d6d3d1", text: "#292524", accent: "#57534e", badge: "#e7e5e4" }, 
  organizador: { bg: "#f5f5f4", border: "#e7e5e4", text: "#1c1917", accent: "#44403c", badge: "#d6d3d1" }, 
  bienestar:   { bg: "#f6f7f5", border: "#ccd1c7", text: "#353d2f", accent: "#535e4b", badge: "#e2e6df" }, 
};

const QUESTIONS = [
  { id: "q1", text: "Cuando alguien tiene un problema, ¿qué hacés primero?", options: [
    { label: "Escucho y trato de entender cómo se siente", value: "empatia" },
    { label: "Analizo los datos y busco la causa raíz", value: "analitico" },
    { label: "Empiezo a hablar y buscar soluciones juntos", value: "comunicador" },
    { label: "Organizo la información para que sea más claro", value: "organizador" },
    { label: "Busco restablecer su equilibrio emocional y energético", value: "bienestar" }
  ]},
  { id: "q2", text: "¿Con qué actividad te sentirías más cómodo/a trabajando?", options: [
    { label: "Acompañar a alguien en un proceso difícil", value: "empatia" },
    { label: "Controlar números o procesos operativos", value: "analitico" },
    { label: "Crear contenido o presentar ideas en redes", value: "comunicador" },
    { label: "Coordinar tareas, agendas y proyectos", value: "organizador" },
    { label: "Promover hábitos saludables, alimentación consciente y calma", value: "bienestar" }
  ]},
  { id: "q3", text: "¿Qué te dicen que hacés muy bien?", options: [
    { label: "Que soy comprensivo/a y la gente confía en mí", value: "empatia" },
    { label: "Que soy muy ordenado/a y detallista", value: "analitico" },
    { label: "Que tengo facilidad para hablar y convencer", value: "comunicador" },
    { label: "Que siempre tengo todo bajo control y en tiempo", value: "organizador" },
    { label: "Que transmito paz, armonía y sé cuidar el cuerpo/mente", value: "bienestar" }
  ]},
  { id: "q4", text: "Si tuvieras que generar ingresos mañana, ¿qué elegiría tu instinto?", options: [
    { label: "Ayudar a alguien directamente con mi tiempo", value: "empatia" },
    { label: "Ofrecer control y orden a un negocio que lo necesita", value: "analitico" },
    { label: "Crear contenido y conectar marcas con personas", value: "comunicador" },
    { label: "Gestionar proyectos o equipos de manera remota", value: "organizador" },
    { label: "Guiar a otros hacia un estilo de vida más sano y equilibrado", value: "bienestar" }
  ]},
  { id: "q5", text: "¿Qué herramienta usás (o usarías) con más naturalidad?", options: [
    { label: "WhatsApp para comunicarme y dar soporte", value: "empatia" },
    { label: "Excel o planillas para llevar registros", value: "analitico" },
    { label: "El celular para grabar y editar videos", value: "comunicador" },
    { label: "Notion, Trello o Google Calendar para organizar", value: "organizador" },
    { label: "Espacios de meditación, recetas sanas o rutinas de cuidado", value: "bienestar" }
  ]},
  { id: "q6", text: "¿En qué tipo de ambiente preferís pasar tus mañanas productivas?", options: [
    { label: "En contacto constante respondiendo dudas y guiando personas", value: "empatia" },
    { label: "En silencio, analizando métricas, reportes o estructuras", value: "analitico" },
    { label: "Ideando conceptos visuales, marcas o guiones creativos", value: "comunicador" },
    { label: "Diseñando cronogramas y delegando flujos de tareas", value: "organizador" },
    { label: "Un entorno armónico, rodeado de plantas, aromas y bienestar integral", value: "bienestar" }
  ]},
  { id: "q7", text: "¿Cuál de estos temas leerías o investigarías por puro placer?", options: [
    { label: "Historias de superación personal o psicología vincular", value: "empatia" },
    { label: "Estrategias de inversión, software eficiente o finanzas", value: "analitico" },
    { label: "Tendencias de marketing digital, algoritmos y storytelling", value: "comunicador" },
    { label: "Metodologías ágiles, organización del tiempo y productividad", value: "organizador" },
    { label: "Alimentación basada en plantas, yoga, aceites esenciales o mindfulness", value: "bienestar" }
  ]},
  { id: "q8", text: "Si pudieras resolverle un problema clave a un emprendedor, ¿cuál elegirías?", options: [
    { label: "Que sus clientes se sientan amados y escuchados en todo momento", value: "empatia" },
    { label: "Que descubra exactamente dónde está perdiendo dinero en sus cuentas", value: "analitico" },
    { label: "Que su marca destaque en redes y atraiga miradas de inmediato", value: "comunicador" },
    { label: "Que consiga estructurar su desorden diario y gane horas libres", value: "organizador" },
    { label: "Que aprenda a bajar el estrés, comer limpio y equilibrar su rutina diaria", value: "bienestar" }
  ]}
];

const PLANS = {
  empatia:     { perfil: "Gestión de WhatsApp", titulo: "Tu capital es la conexión humana", servicio: "Gestor/a de Atención al Cliente vía WhatsApp", icon: "ti-message-circle" },
  analitico:   { perfil: "Asistente de Control Operativo", titulo: "Tu capital es el orden y la precisión", servicio: "Asistente de Control Operativo para Negocios", icon: "ti-chart-line" },
  comunicador: { perfil: "Creador/a UGC", titulo: "Tu capital es tu voz y tu presencia", servicio: "Creador/a de Contenido UGC", icon: "ti-video" },
  organizador: { perfil: "Asistente Virtual / Project Manager", titulo: "Tu capital es tu capacidad de coordinación", servicio: "Asistente Virtual y Coordinador/a de Proyectos", icon: "ti-layout-kanban" },
  bienestar:   { perfil: "Consultoría de Bienestar y Vida Consciente", titulo: "Tu capital es el equilibrio integral", servicio: "Planner y Coach de Estilo de Vida Saludable", icon: "ti-leaf" },
};

// Cambiado para que entregue los botones de descarga de PDF que querías
const PLANES_PREMIUM = {
  empatia:     { mensaje: "¡Acceso concedido! Tu Manual de Gestión de WhatsApp está listo.", btnText: "Descargar Manual Empatía (PDF)", link: "#" },
  analitico:   { mensaje: "¡Acceso concedido! Tu Manual de Control Operativo está listo.", btnText: "Descargar Manual Analítico (PDF)", link: "#" },
  comunicador: { mensaje: "¡Acceso concedido! Tu Manual de Creador UGC está listo.", btnText: "Descargar Manual Comunicador (PDF)", link: "#" },
  organizador: { mensaje: "¡Acceso concedido! Tu Manual de Asistente Virtual está listo.", btnText: "Descargar Manual Organizador (PDF)", link: "#" },
  bienestar:   { mensaje: "¡Acceso concedido! Tu Manual de Bienestar y Vida Consciente está listo.", btnText: "Descargar Manual Bienestar (PDF)", link: "#" },
};

function calcularPerfil(r) {
  const c = { empatia: 0, analitico: 0, comunicador: 0, organizador: 0, bienestar: 0 };
  ["q1","q2","q3","q4","q5","q6","q7","q8"].forEach(k => { if (r[k] && c[r[k]] !== undefined) c[r[k]]++; });
  return Object.entries(c).sort((a, b) => b[1] - a[1])[0][0];
}

function App() {
  const [pantalla, setPantalla] = React.useState("nombre");
  const [current, setCurrent] = React.useState(0);
  const [respuestas, setRespuestas] = React.useState({});
  const [selected, setSelected] = React.useState(null);
  
  const [nombre, setNombre] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [telefono, setTelefono] = React.useState("");
  
  const [isPremiumUnlocked, setIsPremiumUnlocked] = React.useState(false);
  const [inputCode, setInputCode] = React.useState("");
  const [codeError, setCodeError] = React.useState("");

  const [perfil, setPerfil] = React.useState(null);
  const [plan, setPlan] = React.useState(null);
  const [planPremium, setPlanPremium] = React.useState(null);

  const c = perfil ? COLORS[perfil] : COLORS.analitico;

  const handleNext = () => {
    if (!selected) return;
    const newResp = { ...respuestas, [QUESTIONS[current].id]: selected };
    setRespuestas(newResp);
    setSelected(null);
    
    if (current < QUESTIONS.length - 1) { 
      setCurrent(current + 1); 
    } else {
      setPantalla("captura");
    }
  };

  const handleSubmitLead = async (e) => {
    e.preventDefault();
    if (!nombre || !email || !telefono) {
      alert("Por favor, completá todos los campos.");
      return;
    }

    const formAction = "https://docs.google.com/forms/u/0/d/e/1FAIpQLSeu3k2r7O6w6yC6fV9M0hVn8-Z4Y_VqD_V7y2uXv9-kF9z3wA/formResponse";
    const idNombre = "entry.364372982";
    const idEmail = "entry.821946351";
    const idTelefono = "entry.142958374";

    const formData = new FormData();
    formData.append(idNombre, nombre);
    formData.append(idEmail, email);
    formData.append(idTelefono, telefono);

    try {
      await fetch(formAction, {
        method: "POST",
        body: formData,
        mode: "no-cors"
      });
      console.log("Contacto guardado en Google Sheets con éxito.");
    } catch (error) {
      console.error("Error al guardar datos:", error);
    }

    const p = calcularPerfil(respuestas);
    setPerfil(p);
    setPlan(PLANS[p]);
    setPlanPremium(PLANES_PREMIUM[p]);
    setPantalla('resultado');
  };

  const procesarCodigoPremium = () => {
    if (inputCode.trim().toUpperCase() === ACCESS_CODE) {
      setIsPremiumUnlocked(true);
      setCodeError("");
    } else {
      setCodeError("Código incorrecto. Verificá tu comprobante.");
    }
  };

  const reiniciarTest = () => {
    setPantalla("nombre");
    setCurrent(0);
    setRespuestas({});
    setPerfil(null);
    setPlan(null);
    setPlanPremium(null);
    setNombre("");
    setEmail("");
    setTelefono("");
    setInputCode("");
    setIsPremiumUnlocked(false);
  };

  const progress = Math.round(((current + 1) / QUESTIONS.length) * 100);
  const w = { maxWidth: 640, margin: "0 auto", padding: "2.5rem 1.25rem" };
  const card = { background: "#fff", border: "1px solid #e5e5e0", borderRadius: 12, padding: "1.75rem 2rem", marginBottom: "1.25rem" };
  const lbl = { fontSize: 11, color: "#737373", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10, display: "block", fontWeight: 600 };
  const btnD = (bg) => ({ background: bg || "#262626", border: "none", borderRadius: 8, padding: "14px 28px", fontSize: 15, fontWeight: 500, color: "#fff", width: "100%" });
  const btnO = { background: "transparent", border: "1px solid #d4d4d4", borderRadius: 8, padding: "12px 28px", fontSize: 14, color: "#404040", width: "100%", marginTop: 15, fontWeight: 500 };

  if (pantalla === "nombre") return (
    <div style={{ ...w, minHeight: "90vh", display: "flex", alignItems: "center" }}>
      <div style={{ width: "100%" }}>
        <div style={{ background: "#262626", borderRadius: 12, padding: "2.5rem 2rem", marginBottom: "1.25rem", textAlign: "center" }}>
          <i className="ti ti-sparkles" style={{ fontSize: 36, color: "#dfcfc4", display: "block", marginBottom: 14 }} />
          <h1 style={{ fontSize: 25, fontWeight: 500, color: "#fafaf9", marginTop: 0, marginBottom: 10, letterSpacing: "-0.01em" }}>Activador de Capital Humano</h1>
          <p style={{ fontSize: 15, color: "#d6d3d1", lineHeight: 1.6 }}>Descubrí qué propuesta digital se alinea de forma orgánica con tu estructura de talentos.</p>
        </div>
        <div style={card}>
          <label style={lbl}>¿Cómo te llamás para iniciar?</label>
          <input type="text" placeholder="Tu nombre" value={nombre} onChange={e => setNombre(e.target.value)} onKeyDown={e => e.key === "Enter" && nombre && setPantalla("scanner")} />
          <button style={{ ...btnD(), marginTop: 10, opacity: nombre ? 1 : 0.4 }} disabled={!nombre} onClick={() => setPantalla("scanner")}>Empezar el escáner gratis →</button>
        </div>
      </div>
    </div>
  );

  if (pantalla === "scanner") {
    const q = QUESTIONS[current];
    return (
      <div style={w}>
        <div style={{ height: 6, background: "#e5e5e0", borderRadius: 3, marginBottom: "2rem", overflow: "hidden" }}>
          <div style={{ height: 6, width: `${progress}%`, background: "#404040", borderRadius: 3, transition: "width 0.4s" }} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
          <span style={{ ...lbl, margin: 0 }}>Mapeo de Potencial</span>
          <span style={{ fontSize: 13, color: "#737373", fontWeight: 500 }}>Pregunta {current + 1} de {QUESTIONS.length}</span>
        </div>
        <h2 style={{ fontSize: 20, fontWeight: 500, marginBottom: "1.75rem", lineHeight: 1.4 }}>{q.text}</h2>
        
        {q.options.map(opt => {
          const isSelected = selected === opt.value;
          const optColor = COLORS[opt.value] || { bg: "#f5f5f4", border: "#d6d3d1", text: "#1c1917" };
          return (
            <button key={opt.value} onClick={() => setSelected(opt.value)} 
              style={{ 
                display: "block", width: "100%", textAlign: "left", 
                background: isSelected ? optColor.bg : "#fff", 
                border: isSelected ? `2px solid ${optColor.border}` : "1px solid #e5e5e0", 
                borderRadius: 10, padding: "16px 20px", fontSize: 15, 
                color: isSelected ? optColor.text : "#404040", marginBottom: 12, lineHeight: 1.5
              }}>
              {opt.label}
            </button>
          );
        })}
        
        <button style={{ ...btnD(), marginTop: 12, opacity: selected ? 1 : 0.4 }} disabled={!selected} onClick={handleNext}>
          {current < QUESTIONS.length - 1 ? "Siguiente →" : "Finalizar cuestionario →"}
        </button>
      </div>
    );
  }

  if (pantalla === "captura") return (
    <div style={{ ...w, minHeight: "90vh", display: "flex", alignItems: "center" }}>
      <div style={{ width: "100%" }}>
        <div style={{ background: "#262626", borderRadius: 12, padding: "2.5rem 2rem", marginBottom: "1.25rem", textAlign: "center" }}>
          <i className="ti ti-mail-opened" style={{ fontSize: 36, color: "#dfcfc4", display: "block", marginBottom: 14 }} />
          <h1 style={{ fontSize: 23, fontWeight: 500, color: "#fafaf9", marginTop: 0, marginBottom: 10 }}>¡Análisis Completo!</h1>
          <p style={{ fontSize: 14, color: "#d6d3d1", lineHeight: 1.6 }}>Ingresá tus datos para procesar tu diagnóstico y sincronizar tu perfil de inmediato.</p>
        </div>
        <form onSubmit={handleSubmitLead} style={card}>
          <label style={lbl}>Correo Electrónico</label>
          <input type="email" placeholder="ejemplo@correo.com" required value={email} onChange={e => setEmail(e.target.value)} />
          
          <label style={{...lbl, marginTop: 10}}>Teléfono de Contacto (WhatsApp)</label>
          <input type="tel" placeholder="Ej: +54 9 11 1234 5678" required value={telefono} onChange={e => setTelefono(e.target.value)} />
          
          <button type="submit" style={{ ...btnD(), marginTop: 15 }}>Generar mi Diagnóstico Gratis →</button>
        </form>
      </div>
    </div>
  );

  if (pantalla === "resultado" && plan && planPremium) return (
    <div style={w}>
      <div style={{ background: c.bg, borderRadius: 12, padding: "2rem", marginBottom: "1.25rem", border: `1px solid ${c.border}` }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6, background: c.badge, borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 600, color: c.text, marginBottom: 14, textTransform: "uppercase", letterSpacing: "0.04em" }}>
          <i className={`ti ${plan.icon}`} style={{ fontSize: 14 }} /> {plan.perfil}
        </span>
        <h1 style={{ fontSize: 24, fontWeight: 500, color: c.text, marginTop: 0, marginBottom: 10, letterSpacing: "-0.02em" }}>{plan.titulo}</h1>
        <p style={{ fontSize: 15, lineHeight: 1.6, color: c.accent, marginBottom: 16 }}>Hola {nombre}, este es el perfil que domina tu estructura de talentos de forma natural. Tu servicio ideal para monetizar es: <strong>{plan.servicio}</strong>.</p>
      </div>

      {!isPremiumUnlocked && (
        <div style={{ background: "#262626", borderRadius: 12, padding: "2.25rem 2rem", marginBottom: "1.25rem", color: "#fafaf9" }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 12 }}>
            <i className="ti ti-lock" style={{ fontSize: 22, color: "#dfcfc4" }} />
            <h3 style={{ fontSize: 18, fontWeight: 500, margin: 0 }}>Desbloqueá tu Plan de Negocios Premium</h3>
          </div>
          <p style={{ fontSize: 14, color: "#d6d3d1", lineHeight: 1.6, marginBottom: 20 }}>
            Accedé a la descarga de tu manual estratégico completo de 15 días con las herramientas necesarias, plantillas exactas de mensajes y la estrategia de cobro.
          </p>
          
          <div style={{ background: "rgba(255,255,255,0.05)", padding: "1.25rem", borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)" }}>
            <label style={{ ...lbl, color: "#a3a3a3" }}>¿Ya tenés tu código de acceso?</label>
            <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
              <input type="text" placeholder="Ingresá tu código aquí" value={inputCode} onChange={e => setInputCode(e.target.value)} onKeyDown={e => e.key === "Enter" && procesarCodigoPremium()} style={{ background: "#fff", color: "#262626" }} />
              <button onClick={procesarCodigoPremium} style={{ background: "#dfcfc4", color: "#262626", border: "none", borderRadius: 8, padding: "0 20px", fontWeight: 600, fontSize: 14 }}>Activar</button>
            </div>
            {codeError && <p style={{ fontSize: 12, color: "#f87171", marginTop: 8, margin: 0 }}>{codeError}</p>}
          </div>
          
          <div style={{ textAlign: "center", marginTop: 20 }}>
            <a href="https://mpago.la/2GtfXSt" target="_blank" rel="noopener noreferrer" style={{ display: "block", background: "transparent", border: "1px solid #dfcfc4", color: "#dfcfc4", borderRadius: 8, padding: "12px", fontSize: 14, fontWeight: 600 }}>
              Adquirir Plan Premium Completo por USD 25 →
            </a>
          </div>
        </div>
      )}

      <div className={!isPremiumUnlocked ? "premium-blur" : ""}>
        <div style={{...card, textAlign: 'center', padding: '2.5rem 2rem'}}>
          <i className="ti ti-file-text" style={{fontSize: 42, color: c.text, marginBottom: 12, display: 'block'}} />
          <p style={{fontSize: 16, fontWeight: 500, color: '#1c1917', marginBottom: 6}}>{planPremium.mensaje}</p>
          <p style={{fontSize: 14, color: '#737373', marginBottom: 20}}>Hacé clic en el botón de abajo para bajarte la hoja de ruta integral en formato PDF.</p>
          <a href={isPremiumUnlocked ? planPremium.link : "#"} target={isPremiumUnlocked ? "_blank" : "_self"} rel="noopener noreferrer"
             style={{
               display: 'inline-block', background: isPremiumUnlocked ? '#262626' : '#d4d4d4', 
               color: '#fff', padding: '14px 32px', borderRadius: 8, fontWeight: 600, fontSize: 15,
               pointerEvents: isPremiumUnlocked ? 'auto' : 'none', textDecoration: 'none'
             }}>
            <i className="ti ti-download" style={{marginRight: 8}} /> {planPremium.btnText}
          </a>
        </div>
      </div>

      <button style={btnO} onClick={reiniciarTest}>Volver a empezar</button>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
