      { titulo: "Cierre al final de la semana de prueba", texto: "Hola [Nombre]! Te mando el reporte: organicé [X] tareas, coordiné [Y] reuniones, respondí [Z] mensajes — aproximadamente [N] horas de tu tiempo. ¿Seguimos el mes que viene con el paquete [nombre]?" },
    ],
    precios: { titulo: "Cómo cobrar", items: ["Starter (5 hs/sem): USD 150-200/mes", "Estándar (10 hs/sem): USD 250-350/mes", "Premium (20 hs/sem): USD 400-600/mes", "Cobrar el mes por adelantado antes de empezar", "Medio de pago: Payoneer, Wise o transferencia", "Siempre ofrecé 1 semana de prueba gratuita para cerrar"] },
    frase: "El caos que vos ves como obvio de resolver, para tu cliente es una carga diaria que lo agota. Vos sos la solución que están buscando."

  bienestar: {

    pasos: [
      { numero: 1, titulo: "Estructurá tu catálogo de 3 Rutinas Base", detalle: "Diseñá en Canva tres guías premium en PDF: (1) Transición a alimentación limpia/consciente, (2) Rituales de mañana para reducción del estrés, (3) Plan de organización y detox del hogar. Este catálogo es tu pilar comercial.", herramientas: [{ nombre: "Canva — Diseños Minimalistas", link: "https://canva.com", desc: "Guías estéticas de hábitos" }], tiempo: "4 horas" },
      { numero: 2, titulo: "Alianzas con espacios holísticos locales", detalle: "Presentate en centros de yoga, tiendas saludables o estéticas de tu zona. Ofrecé un taller corto de 30 minutos o empaquetar tus guías como beneficio exclusivo para sus clientes. Las alianzas físicas aceleran la confianza.", herramientas: [{ nombre: "Instagram — Búsqueda de Nicho", link: "https://instagram.com", desc: "Conectá con espacios alineados" }], tiempo: "3 horas" },
      { numero: 3, titulo: "Ofrecé una Sesión de Diagnóstico de Rutinas de 20 minutos", detalle: "Contactá personas en transición o emprendedores cansados. Revisá gratis sus tres principales fugas de bienestar: calidad del sueño, organización de comidas y niveles de ansiedad. Cerrá ofreciendo tu acompañamiento de 15 días.", herramientas: [{ nombre: "Zoom", link: "https://zoom.us", desc: "Sesiones online gratuitas 40 min" }, { nombre: "Calendly", link: "https://calendly.com", desc: "Agenda automática de turnos" }], tiempo: "1 hora diaria" },
      { numero: 4, titulo: "Creá tu programa de acompañamiento de 15 días", detalle: "Diseñá un programa con: check-in diario por WhatsApp (5 min), receta saludable + hábito del día, ejercicio de respiración o mindfulness, reporte semanal de avance. Entregá por WhatsApp o grupo de Telegram.", herramientas: [{ nombre: "Telegram", link: "https://telegram.org", desc: "Grupos de acompañamiento gratis" }, { nombre: "Canva — Plan de hábitos", link: "https://canva.com", desc: "Diseñá tu programa visual" }], tiempo: "3 horas" },
      { numero: 5, titulo: "Publicá contenido que demuestre tu expertise", detalle: "Publicá 3 veces por semana en Instagram: receta saludable, tip de bienestar o reflexión sobre equilibrio. El contenido gratuito genera confianza que convierte en clientes. Usá hashtags de nicho: #bienestarintegrall #alimentacionconsciente #habitos saludables.", herramientas: [{ nombre: "Later — programación de posts", link: "https://later.com", desc: "Programá contenido gratis" }, { nombre: "Canva — Templates wellness", link: "https://canva.com", desc: "Diseños de bienestar listos" }], tiempo: "1 hora por semana" },
    ],
    mensajes: [
      { titulo: "Mensaje a cliente potencial desbordado", texto: "Hola [Nombre]! Noto que llevás un ritmo de trabajo muy intenso. Me especializo en diseño de rutinas de bienestar y alimentación consciente para profesionales desbordados. Te propongo una sesión de diagnóstico de hábitos de 20 minutos sin cargo. ¿Te gustaría coordinar?" },
      { titulo: "Propuesta de alianza a espacio holístico", texto: "Hola equipo de [Nombre]! Me encanta la vibra de su espacio. Soy asesora de bienestar integral y me encantaría proponer un taller corto sin costo para su comunidad o empaquetar mis guías de vida saludable con sus servicios. ¿Podríamos charlar 10 minutos?" },
      { titulo: "Cierre de programa de 15 días", texto: "Hola [Nombre]! Terminamos los 15 días juntos. Los cambios que lograste: [lista]. Para seguir profundizando tengo disponible el programa mensual. ¿Te gustaría continuar?" },
    ],
    precios: { titulo: "Cómo cobrar", items: ["Programa 15 días de acompañamiento: $25.000 — $40.000", "Programa mensual completo: $45.000 — $70.000/mes", "Taller grupal online (hasta 10 personas): $15.000 — $25.000", "Guías digitales en PDF: $5.000 — $10.000 por unidad", "Cobrar por adelantado antes de la primera sesión", "Medio de pago: Mercado Pago"] },
    frase: "El mayor capital de una persona es su salud y equilibrio interno. Vos tenés el mapa para guiarlas de vuelta al eje."
  }
};

function calcularPerfil(r) {
  const c = { empatia: 0, analitico: 0, comunicador: 0, organizador: 0, bienestar: 0 };
  ["q1","q2","q3","q4","q5","q6","q7","q8"].forEach(k => { if (r[k] && c[r[k]] !== undefined) c[r[k]]++; });
  return Object.entries(c).sort((a, b) => b[1] - a[1])[0][0];
}

function App() {
  const [step, setStep] = React.useState("nombre");
  const [current, setCurrent] = React.useState(0);
  const [respuestas, setRespuestas] = React.useState({});
  const [selected, setSelected] = React.useState(null);
  const [nombre, setNombre] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [telefono, setTelefono] = React.useState("");
  const [isPremiumUnlocked, setIsPremiumUnlocked] = React.useState(false);
  const [inputCode, setInputCode] = React.useState("");
  const [codeError, setCodeError] = React.useState("");
  const [perfil, setPerfil] = React.useState(null);
  const [plan, setPlan] = React.useState(null);
  const [planPremium, setPlanPremium] = React.useState(null);

  const c = perfil ? COLORS[perfil] : COLORS.analitico;

  const handleNext = () => {
    if (!selected) return;
    const newResp = { ...respuestas, [QUESTIONS[current].id]: selected };
    setRespuestas(newResp);
    setSelected(null);
    if (current < QUESTIONS.length - 1) { setCurrent(current + 1); }
    else { setStep("captura"); }
  };

  const enviarDatosYProcesar = async (e) => {
    e.preventDefault();
    if (!nombre || !email || !telefono) return;
    const p = calcularPerfil(respuestas);
    try {
      await fetch(SHEETS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre, email, telefono, perfil: PLANS[p]?.perfil || p })
      });
    } catch (err) { console.error("Error al enviar datos:", err); }
    setPerfil(p);
    setPlan(PLANS[p]);
    setPlanPremium(PLANES_PREMIUM[p]);
    setStep("resultado");
  };

  const procesarCodigoPremium = () => {
    if (inputCode.trim().toUpperCase() === ACCESS_CODE) { setIsPremiumUnlocked(true); setCodeError(""); }
    else setCodeError("Código incorrecto. Verificá tu comprobante.");
  };

  const reiniciarTest = () => {
    setStep("nombre"); setCurrent(0); setRespuestas({}); setPerfil(null);
    setPlan(null); setPlanPremium(null); setNombre(""); setEmail("");
    setTelefono(""); setInputCode(""); setIsPremiumUnlocked(false);
  };

  const progress = Math.round(((current + 1) / QUESTIONS.length) * 100);
  const w = { maxWidth: 640, margin: "0 auto", padding: "2.5rem 1.25rem" };
  const card = { background: "#fff", border: "1px solid #e5e5e0", borderRadius: 12, padding: "1.75rem 2rem", marginBottom: "1.25rem" };
  const lbl = { fontSize: 11, color: "#737373", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10, display: "block", fontWeight: 600 };
  const btnD = (bg) => ({ background: bg || "#262626", border: "none", borderRadius: 8, padding: "14px 28px", fontSize: 15, fontWeight: 500, color: "#fff", width: "100%" });
  const btnO = { background: "transparent", border: "1px solid #d4d4d4", borderRadius: 8, padding: "12px 28px", fontSize: 14, color: "#404040", width: "100%", marginTop: 15, fontWeight: 500 };

  if (step === "nombre") return (
    <div style={{ ...w, minHeight: "90vh", display: "flex", alignItems: "center" }}>
      <div style={{ width: "100%" }}>
        <div style={{ background: "#262626", borderRadius: 12, padding: "2.5rem 2rem", marginBottom: "1.25rem", textAlign: "center" }}>
          <i className="ti ti-sparkles" style={{ fontSize: 36, color: "#dfcfc4", display: "block", marginBottom: 14 }} />
          <h1 style={{ fontSize: 25, fontWeight: 500, color: "#fafaf9", marginTop: 0, marginBottom: 10 }}>Activador de Capital Humano</h1>
          <p style={{ fontSize: 15, color: "#d6d3d1", lineHeight: 1.6 }}>Descubrí qué servicio se alinea con tu estructura de talentos e instinto profundo.</p>
        </div>
        <div style={card}>
          <label style={lbl}>¿Cómo te llamás para iniciar?</label>
          <input type="text" placeholder="Tu nombre" value={nombre} onChange={e => setNombre(e.target.value)} onKeyDown={e => e.key === "Enter" && nombre && setStep("scanner")} />
          <button style={{ ...btnD(), marginTop: 10, opacity: nombre ? 1 : 0.4 }} disabled={!nombre} onClick={() => setStep("scanner")}>Empezar el escáner gratis →</button>
        </div>
      </div>
    </div>
  );

  if (step === "scanner") {
    const q = QUESTIONS[current];
    return (
      <div style={w}>
        <div style={{ height: 6, background: "#e5e5e0", borderRadius: 3, marginBottom: "2rem", overflow: "hidden" }}>
          <div style={{ height: 6, width: `${progress}%`, background: "#404040", borderRadius: 3, transition: "width 0.4s" }} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
          <span style={{ ...lbl, margin: 0 }}>Mapeo de Potencial</span>
          <span style={{ fontSize: 13, color: "#737373", fontWeight: 500 }}>Pregunta {current + 1} de {QUESTIONS.length}</span>
        </div>
        <h2 style={{ fontSize: 20, fontWeight: 500, marginBottom: "1.75rem", lineHeight: 1.4 }}>{q.text}</h2>
        {q.options.map(opt => {
          const isSelected = selected === opt.value;
          const optColor = COLORS[opt.value] || { bg: "#f5f5f4", border: "#d6d3d1", text: "#1c1917" };
          return (
            <button key={opt.value} onClick={() => setSelected(opt.value)} style={{ display: "block", width: "100%", textAlign: "left", background: isSelected ? optColor.bg : "#fff", border: isSelected ? `2px solid ${optColor.border}` : "1px solid #e5e5e0", borderRadius: 10, padding: "16px 20px", fontSize: 15, color: isSelected ? optColor.text : "#404040", marginBottom: 12, lineHeight: 1.5 }}>
              {opt.label}
            </button>
          );
        })}
        <button style={{ ...btnD(), marginTop: 12, opacity: selected ? 1 : 0.4 }} disabled={!selected} onClick={handleNext}>
          {current < QUESTIONS.length - 1 ? "Siguiente →" : "Finalizar cuestionario →"}
        </button>
      </div>
    );
  }

  if (step === "captura") return (
    <div style={{ ...w, minHeight: "90vh", display: "flex", alignItems: "center" }}>
      <div style={{ width: "100%" }}>
        <div style={{ background: "#262626", borderRadius: 12, padding: "2.5rem 2rem", marginBottom: "1.25rem", textAlign: "center" }}>
          <i className="ti ti-mail-opened" style={{ fontSize: 36, color: "#dfcfc4", display: "block", marginBottom: 14 }} />
          <h1 style={{ fontSize: 23, fontWeight: 500, color: "#fafaf9", marginTop: 0, marginBottom: 10 }}>¡Análisis de Potencial Completo!</h1>
          <p style={{ fontSize: 14, color: "#d6d3d1", lineHeight: 1.6 }}>Ingresá tus datos para procesar tu diagnóstico.</p>
        </div>
        <form onSubmit={enviarDatosYProcesar} style={card}>
          <label style={lbl}>Correo Electrónico</label>
          <input type="email" placeholder="ejemplo@correo.com" required value={email} onChange={e => setEmail(e.target.value)} />
          <label style={{ ...lbl, marginTop: 4 }}>Teléfono (WhatsApp)</label>
          <input type="tel" placeholder="+54 9 11 1234 5678" required value={telefono} onChange={e => setTelefono(e.target.value)} />
          <button type="submit" style={{ ...btnD(), marginTop: 8 }}>Generar mi Diagnóstico Gratis →</button>
        </form>
      </div>
    </div>
  );

  if (step === "resultado" && plan && planPremium) return (
    <div style={w}>
      <div style={{ background: c.bg, borderRadius: 12, padding: "2rem", marginBottom: "1.25rem", border: `1px solid ${c.border}` }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6, background: c.badge, borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 600, color: c.text, marginBottom: 14, textTransform: "uppercase", letterSpacing: "0.04em" }}>
          <i className={`ti ${plan.icon}`} style={{ fontSize: 14 }} /> {plan.perfil}
        </span>
        <h1 style={{ fontSize: 24, fontWeight: 500, color: c.text, marginTop: 0, marginBottom: 10 }}>{plan.titulo}</h1>
        <p style={{ fontSize: 15, lineHeight: 1.6, color: c.accent, marginBottom: 16 }}>Hola {nombre}, tu servicio ideal para monetizar es: <strong>{plan.servicio}</strong>.</p>
        <div style={{ background: "#ffffff", borderRadius: 10, padding: "16px 20px", fontSize: 14, fontStyle: "italic", color: c.text, lineHeight: 1.7, border: `1px solid ${c.border}` }}>{planPremium.propuesta}</div>
      </div>

      {!isPremiumUnlocked && (
        <div style={{ background: "#262626", borderRadius: 12, padding: "2.25rem 2rem", marginBottom: "1.25rem", color: "#fafaf9" }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 12 }}>
            <i className="ti ti-lock" style={{ fontSize: 22, color: "#dfcfc4" }} />
            <h3 style={{ fontSize: 18, fontWeight: 500, margin: 0 }}>Desbloqueá tu Plan de Negocios Premium</h3>
          </div>
          <p style={{ fontSize: 14, color: "#d6d3d1", lineHeight: 1.6, marginBottom: 20 }}>Accedé a la hoja de ruta paso a paso con herramientas exactas, plantillas de mensajes de venta y estrategia de precios.</p>
          <div style={{ background: "rgba(255,255,255,0.05)", padding: "1.25rem", borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)", marginBottom: 16 }}>
            <label style={{ ...lbl, color: "#a3a3a3" }}>¿Ya tenés tu código de acceso?</label>
            <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
              <input type="text" placeholder="Ingresá tu código aquí" value={inputCode} onChange={e => setInputCode(e.target.value)} onKeyDown={e => e.key === "Enter" && procesarCodigoPremium()} style={{ background: "#fff", color: "#262626", marginBottom: 0 }} />
              <button onClick={procesarCodigoPremium} style={{ background: "#dfcfc4", color: "#262626", border: "none", borderRadius: 8, padding: "0 20px", fontWeight: 600, fontSize: 14, cursor: "pointer", whiteSpace: "nowrap" }}>Activar</button>
            </div>
            {codeError && <p style={{ fontSize: 12, color: "#f87171", marginTop: 8, marginBottom: 0 }}>{codeError}</p>}
          </div>
          <a href="https://mpago.la/2GtfXSt" target="_blank" rel="noopener noreferrer" style={{ display: "block", background: "transparent", border: "1px solid #dfcfc4", color: "#dfcfc4", borderRadius: 8, padding: "12px", fontSize: 14, fontWeight: 600, textAlign: "center" }}>
            Adquirir Plan Premium Completo por USD 25 →
          </a>
        </div>
      )}

      <div className={!isPremiumUnlocked ? "premium-blur" : ""}>
        <div style={card}>
          <span style={lbl}>Tu plan paso a paso — con herramientas y tiempos exactos</span>
          {planPremium.pasos.map((p, i) => (
            <div key={p.numero} style={{ borderTop: i > 0 ? "1px solid #f5f5f4" : "none", paddingTop: i > 0 ? 24 : 8, marginTop: i > 0 ? 24 : 0 }}>
              <div style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 12 }}>
                <div style={{ minWidth: 28, height: 28, borderRadius: "50%", background: c.badge, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: c.text, flexShrink: 0 }}>{p.numero}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", width: "100%", justifyContent: "space-between" }}>
                  <p style={{ fontSize: 15, fontWeight: 600, margin: 0, color: "#1c1917" }}>{p.titulo}</p>
                  <span style={{ fontSize: 11, color: c.accent, background: c.bg, borderRadius: 4, padding: "3px 8px", fontWeight: 500, border: `1px solid ${c.border}` }}>⏱ {p.tiempo}</span>
                </div>
              </div>
              <p style={{ fontSize: 14, lineHeight: 1.7, color: "#525252", marginBottom: 14, paddingLeft: 42 }}>{p.detalle}</p>
              {p.herramientas && p.herramientas.length > 0 && (
                <div style={{ paddingLeft: 42 }}>
                  {p.herramientas.map(h => (
                    <a key={h.nombre} href={isPremiumUnlocked ? h.link : "#"} target={isPremiumUnlocked ? "_blank" : "_self"} rel="noopener noreferrer" style={{ display: "flex", alignItems: "center", gap: 10, background: "#fafafa", border: "1px solid #f0f0f0", borderRadius: 8, padding: "10px 14px", marginBottom: 8 }}>
                      <i className="ti ti-external-link" style={{ fontSize: 14, color: "#737373", flexShrink: 0 }} />
                      <div>
                        <p style={{ fontSize: 13, fontWeight: 500, color: "#262626", margin: 0 }}>{h.nombre}</p>
                        <p style={{ fontSize: 12, color: "#737373", margin: 0, marginTop: 2 }}>{h.desc}</p>
                      </div>
                    </a>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>

        <div style={{ background: "#ffffff", border: `1px solid ${c.border}`, borderRadius: 12, padding: "1.75rem 2rem", marginBottom: "1.25rem" }}>
          <span style={{ ...lbl, color: c.text }}>Guiones de Comunicación Inmediata</span>
          {planPremium.mensajes.map((m, i) => (
            <div key={i} style={{ marginTop: 20, borderTop: i > 0 ? "1px solid #f5f5f4" : "none", paddingTop: i > 0 ? 20 : 0 }}>
              <p style={{ fontSize: 11, fontWeight: 600, color: c.accent, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>{m.titulo}</p>
              <div style={{ background: c.bg, borderRadius: 8, padding: "14px 16px", fontSize: 13.5, lineHeight: 1.7, color: c.text, whiteSpace: "pre-wrap", border: `1px solid ${c.border}` }}>{m.texto}</div>
            </div>
          ))}
        </div>

        <div style={card}>
          <span style={lbl}>{planPremium.precios.titulo}</span>
          {planPremium.precios.items.map((item, i) => (
            <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start", marginTop: 12 }}>
              <span style={{ width: 6, height: 6, borderRadius: "50%", background: c.border, flexShrink: 0, marginTop: 7 }} />
              <p style={{ fontSize: 14, lineHeight: 1.6, color: "#404040", margin: 0 }}>{item}</p>
            </div>
          ))}
        </div>

        <div style={{ background: "#262626", borderRadius: 12, padding: "1.75rem", marginBottom: "1.25rem", textAlign: "center" }}>
          <p style={{ fontSize: 15, fontWeight: 400, color: "#f5f5f4", lineHeight: 1.7, margin: 0, fontStyle: "italic" }}>"{planPremium.frase}"</p>
        </div>
      </div>

      <button style={btnO} onClick={reiniciarTest}>Volver a empezar</button>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
