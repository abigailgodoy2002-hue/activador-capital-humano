<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activador de Capital Humano</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/1.35.0/font/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f8f6; color: #262626; min-height: 100vh; }
    input { font-family: inherit; font-size: 15px; padding: 12px 16px; border: 1px solid #e5e5e0; border-radius: 8px; width: 100%; margin-bottom: 12px; outline: none; }
    button { font-family: inherit; cursor: pointer; border: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

function App() {
  const [pantalla, setPantalla] = React.useState("nombre");
  const [nombre, setNombre] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [telefono, setTelefono] = React.useState("");

  const handleSubmitLead = async (e) => {
    e.preventDefault();
    if (!nombre || !email || !telefono) return;

    const formAction = "https://docs.google.com/forms/u/0/d/e/1FAIpQLSeu3k2r7O6w6yC6fV9M0hVn8-Z4Y_VqD_V7y2uXv9-kF9z3wA/formResponse";
    const formData = new FormData();
    formData.append("entry.364372982", nombre);
    formData.append("entry.821946351", email);
    formData.append("entry.142958374", telefono);

    try {
      await fetch(formAction, { method: "POST", body: formData, mode: "no-cors" });
    } catch (error) {
      console.error(error);
    }

    setPantalla("resultado");
  };

  if (pantalla === "nombre") return (
    <div style={{ maxWidth: 500, margin: "100px auto", padding: 20, textAlign: "center" }}>
      <h2>Activador de Capital Humano</h2>
      <input type="text" placeholder="Tu nombre" value={nombre} onChange={e => setNombre(e.target.value)} />
      <button onClick={() => setPantalla("captura")} style={{ background: "#262626", color: "#fff", padding: "12px 24px", borderRadius: 8, marginTop: 10 }}>Siguiente</button>
    </div>
  );

  if (pantalla === "captura") return (
    <div style={{ maxWidth: 500, margin: "100px auto", padding: 20 }}>
      <h3>Dejanos tus datos para ver el resultado</h3>
      <form onSubmit={handleSubmitLead}>
        <input type="email" placeholder="Tu Email" value={email} onChange={e => setEmail(e.target.value)} required />
        <input type="tel" placeholder="Tu WhatsApp" value={telefono} onChange={e => setTelefono(e.target.value)} required />
        <button type="submit" style={{ background: "#262626", color: "#fff", padding: "12px 24px", borderRadius: 8, width: "100%" }}>Generar Diagnóstico</button>
      </form>
    </div>
  );

  if (pantalla === "resultado") return (
    <div style={{ maxWidth: 500, margin: "100px auto", padding: 20, textAlign: "center" }}>
      <h2>¡Gracias por participar, {nombre}!</h2>
      <p style={{ marginTop: 10 }}>Pronto nos comunicaremos con vos para enviarte tu perfil optimizado.</p>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
