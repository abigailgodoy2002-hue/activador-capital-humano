<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Pago Confirmado! — Activador de Capital Humano</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f8f6; color: #262626; min-height: 100vh; display: flex; alignItems: center; justifyContent: center; padding: 1.25rem; -webkit-font-smoothing: antialiased; }
    .card { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 2.5rem 2rem; maxWidth: 480px; width: 100%; textAlign: center; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .icon-box { min-width: 56px; height: 56px; borderRadius: 50%; background: #eedfd5; color: #4a3b32; display: inline-flex; alignItems: center; justifyContent: center; margin-bottom: 1.25rem; font-size: 24px; }
    h1 { font-size: 24px; font-weight: 500; margin-top: 0; margin-bottom: 10px; letter-spacing: -0.02em; }
    p { font-size: 15px; color: #525252; line-height: 1.6; margin-bottom: 1.5rem; }
    .code-container { background: #f5f5f4; border: 1px dashed #d6d3d1; border-radius: 8px; padding: 16px; margin-bottom: 1.75rem; }
    .lbl { font-size: 11px; color: #737373; letter-spacing: "0.08em"; text-transform: uppercase; margin-bottom: 6px; display: block; font-weight: 600; }
    .code-text { font-size: 22px; font-weight: 700; letter-spacing: 0.15em; color: #1c1917; }
    .btn { display: block; background: #262626; color: #fff; border: none; border-radius: 8px; padding: 14px 28px; font-size: 15px; font-weight: 500; text-decoration: none; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #404040; }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon-box">
      <i class="ti ti-circle-check"></i>
    </div>
    <h1>¡Gracias por tu compra!</h1>
    <p>Tu pago fue procesado con éxito. Copiá tu código de acceso exclusivo para desbloquear tu Plan de Negocios Premium de 15 días inmediatamente.</p>
    
    <div class="code-container">
      <span class="lbl">Tu Código Premium</span>
      <span class="code-text">AMAN2026</span>
    </div>
    
    <a href="https://activador-capital-humano-r4e1.vercel.app/" class="btn">Volver al Test y Activar →</a>
  </div>

</body>
</html>
