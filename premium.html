<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan Premium — Activador de Capital Humano</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
    input { font-family: inherit; font-size: 14px; padding: 9px 12px; border: 0.5px solid #ccc; border-radius: 8px; width: 100%; outline: none; background: #fff; color: #1a1a1a; }
    input:focus { border-color: #1a1a1a; }
    button { font-family: inherit; cursor: pointer; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const ACCESS_CODE = "AMAN2026";

const COLORS = {
  empatia:     { bg: "#E1F5EE", border: "#1D9E75", text: "#085041", accent: "#0F6E56", badge: "#9FE1CB" },
  analitico:   { bg: "#E6F1FB", border: "#378ADD", text: "#042C53", accent: "#185FA5", badge: "#B5D4F4" },
  comunicador: { bg: "#FAEEDA", border: "#EF9F27", text: "#412402", accent: "#BA7517", badge: "#FAC775" },
  organizador: { bg: "#FBEAF0", border: "#D4537E", text: "#4B1528", accent: "#993556", badge: "#F4C0D1" },
};

const QUESTIONS = [
  { id: "q1", text: "Cuando alguien tiene un problema, ¿qué hacés primero?", options: [
    { label: "Escucho y trato de entender cómo se siente", value: "empatia" },
    { label: "Analizo los datos y busco la causa raíz", value: "analitico" },
    { label: "Empiezo a hablar y buscar soluciones juntos", value: "comunicador" },
    { label: "Organizo la información para que sea más claro", value: "organizador" },
  ]},
  { id: "q2", text: "¿Con qué actividad te sentirías más cómodo/a trabajando?", options: [
    { label: "Acompañar a alguien en un proceso difícil", value: "empatia" },
    { label: "Controlar números o procesos operativos", value: "analitico" },
    { label: "Crear contenido o presentar ideas en redes", value: "comunicador" },
    { label: "Coordinar tareas, agendas y proyectos", value: "organizador" },
  ]},
  { id: "q3", text: "¿Qué te dicen que hacés muy bien?", options: [
    { label: "Que soy comprensivo/a y la gente confía en mí", value: "empatia" },
    { label: "Que soy muy ordenado/a y detallista", value: "analitico" },
    { label: "Que tengo facilidad para hablar y convencer", value: "comunicador" },
    { label: "Que siempre tengo todo bajo control y en tiempo", value: "organizador" },
  ]},
  { id: "q4", text: "Si tuvieras que generar ingresos mañana, ¿qué elegiría tu instinto?", options: [
    { label: "Ayudar a alguien directamente con mi tiempo", value: "empatia" },
    { label: "Ofrecer control y orden a un negocio que lo necesita", value: "analitico" },
    { label: "Crear contenido y conectar marcas con personas", value: "comunicador" },
    { label: "Gestionar proyectos o equipos de manera remota", value: "organizador" },
  ]},
  { id: "q5", text: "¿Qué herramienta usás (o usarías) con más naturalidad?", options: [
    { label: "WhatsApp para comunicarme y dar soporte", value: "empatia" },
    { label: "Excel o planillas para llevar registros", value: "analitico" },
    { label: "El celular para grabar y editar videos", value: "comunicador" },
    { label: "Notion, Trello o Google Calendar para organizar", value: "organizador" },
  ]},
  { id: "q6", text: "¿Cuántas horas por día podés dedicar a tu nuevo ingreso?", options: [
    { label: "1 a 2 horas", value: "poco" },
    { label: "3 a 4 horas", value: "medio" },
    { label: "Más de 4 horas", value: "mucho" },
    { label: "Horario flexible según el día", value: "flexible" },
  ]},
  { id: "q7", text: "¿Qué experiencia previa tenés?", options: [
    { label: "Trabajo en relación de dependencia o lo hice antes", value: "dependencia" },
    { label: "Tuve o tengo un emprendimiento propio", value: "emprendimiento" },
    { label: "Estudié o me formé en algo específico", value: "formacion" },
    { label: "No tengo experiencia formal pero tengo muchas ganas", value: "sinexp" },
  ]},
  { id: "q8", text: "¿Cuál es tu mayor obstáculo para generar ingresos ahora?", options: [
    { label: "No sé por dónde empezar", value: "inicio" },
    { label: "No tengo clientes ni contactos", value: "clientes" },
    { label: "Me falta confianza en mí mismo/a", value: "confianza" },
    { label: "No tengo tiempo suficiente", value: "tiempo" },
  ]},
];

const PLANS = {
  empatia:     { perfil: "Gestión de WhatsApp", titulo: "Tu capital es la conexión humana", servicio: "Gestor/a de Atención al Cliente vía WhatsApp", icon: "ti-message-circle" },
  analitico:   { perfil: "Asistente de Control Operativo", titulo: "Tu capital es el orden y la precisión", servicio: "Asistente de Control Operativo para Negocios", icon: "ti-chart-line" },
  comunicador: { perfil: "Creador/a UGC", titulo: "Tu capital es tu voz y tu presencia", servicio: "Creador/a de Contenido UGC", icon: "ti-video" },
  organizador: { perfil: "Asistente Virtual / Project Manager", titulo: "Tu capital es tu capacidad de coordinación", servicio: "Asistente Virtual y Coordinador/a de Proyectos", icon: "ti-layout-kanban" },
};

function calcularPerfil(r) {
  const c = { empatia: 0, analitico: 0, comunicador: 0, organizador: 0 };
  ["q1","q2","q3","q4","q5"].forEach(k => { if (r[k] && c[r[k]] !== undefined) c[r[k]]++; });
  return Object.entries(c).sort((a, b) => b[1] - a[1])[0][0];
}

function App() {
  const [step, setStep] = React.useState("acceso");
  const [code, setCode] = React.useState("");
  const [codeError, setCodeError] = React.useState("");
  const [current, setCurrent] = React.useState(0);
  const [respuestas, setRespuestas] = React.useState({});
  const [selected, setSelected] = React.useState(null);
  const [perfil, setPerfil] = React.useState(null);
  const [plan, setPlan] = React.useState(null);
  const [aiResult, setAiResult] = React.useState(null);
  const [nombre, setNombre] = React.useState("");

  const c = perfil ? COLORS[perfil] : COLORS.analitico;

  const verificarCodigo = () => {
    if (code.trim().toUpperCase() === ACCESS_CODE) { setStep("nombre"); setCodeError(""); }
    else setCodeError("Código incorrecto. Verificá que lo hayas copiado bien.");
  };

  const handleNext = () => {
    if (!selected) return;
    const newResp = { ...respuestas, [QUESTIONS[current].id]: selected };
    setRespuestas(newResp);
    setSelected(null);
    if (current < QUESTIONS.length - 1) { setCurrent(current + 1); }
    else {
      const p = calcularPerfil(newResp);
      setPerfil(p); setPlan(PLANS[p]);
      setStep("loading");
      generarPlan(p, newResp);
    }
  };

  const generarPlan = async (p, resp) => {
    const planBase = PLANS[p];
    const obstaculos = { inicio: "no sabe por dónde empezar", clientes: "no tiene clientes aún", confianza: "le falta confianza", tiempo: "tiene poco tiempo disponible" };
    const tiempo = { poco: "1-2 horas por día", medio: "3-4 horas por día", mucho: "más de 4 horas por día", flexible: "horario flexible" };
    const exp = { dependencia: "experiencia en relación de dependencia", emprendimiento: "experiencia emprendedora previa", formacion: "formación específica", sinexp: "sin experiencia formal pero con muchas ganas" };

    const prompt = `Sos un coach experto en activación de ingresos online. La persona se llama ${nombre} y su perfil es "${planBase.perfil}" — va a ofrecer "${planBase.servicio}". Tiempo disponible: ${tiempo[resp.q6]||"flexible"}. Experiencia: ${exp[resp.q7]||"variada"}. Obstáculo: ${obstaculos[resp.q8]||"arrancar"}. Generá en español argentino (tuteo informal). SOLO JSON sin backticks: {"bienvenida":"mensaje personalizado 2-3 oraciones","propuesta_valor":"propuesta exacta lista para usar","pasos":[{"numero":1,"titulo":"título","detalle":"instrucción específica","tiempo_estimado":"ej: 30 minutos"},{"numero":2,"titulo":"...","detalle":"...","tiempo_estimado":"..."},{"numero":3,"titulo":"...","detalle":"...","tiempo_estimado":"..."},{"numero":4,"titulo":"...","detalle":"...","tiempo_estimado":"..."},{"numero":5,"titulo":"...","detalle":"...","tiempo_estimado":"..."}],"script":"mensaje exacto para copiar con [corchetes]","primer_cliente":"descripción concreta del cliente ideal","meta_7_dias":"meta concreta para 7 días","frase_cierre":"frase poderosa y personal"}`;

    try {
      const res = await fetch("/.netlify/functions/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 2000, messages: [{ role: "user", content: prompt }] })
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || "";
      setAiResult(JSON.parse(text.replace(/```json|```/g,"").trim()));
    } catch { setAiResult(null); }
    setStep("resultado");
  };

  const progress = Math.round((current / QUESTIONS.length) * 100);
  const w = { maxWidth: 620, margin: "0 auto", padding: "2rem 1rem" };
  const card = { background: "#fff", border: "0.5px solid rgba(0,0,0,0.12)", borderRadius: 12, padding: "1.5rem 1.75rem", marginBottom: "1rem" };
  const lbl = { fontSize: 11, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8, display: "block" };
  const btnD = { background: "#1a1a1a", border: "none", borderRadius: 8, padding: "12px 28px", fontSize: 15, fontWeight: 500, cursor: "pointer", color: "#f5f5f0", width: "100%" };
  const btnO = { background: "transparent", border: "0.5px solid rgba(0,0,0,0.25)", borderRadius: 8, padding: "11px 28px", fontSize: 14, cursor: "pointer", color: "#1a1a1a", width: "100%", marginTop: 10 };

  if (step === "acceso") return (
    <div style={{ ...w, minHeight: "100vh", display: "flex", alignItems: "center" }}>
      <div style={{ width: "100%" }}>
        <div style={{ background: "#1a1a1a", borderRadius: 12, padding: "2rem", marginBottom: "1rem", textAlign: "center" }}>
          <i className="ti ti-lock-open" style={{ fontSize: 32, color: "#f5c842", display: "block", marginBottom: 12 }} />
          <h1 style={{ fontSize: 24, fontWeight: 500, color: "#f5f5f0", marginTop: 0, marginBottom: 8 }}>Plan Premium</h1>
          <p style={{ fontSize: 14, color: "#aaa", lineHeight: 1.7 }}>Ingresá tu código de acceso para desbloquear tu plan de negocios personalizado.</p>
        </div>
        <div style={card}>
          <label style={lbl}>Código de acceso</label>
          <input type="text" placeholder="Ej: AMAN2026" value={code} onChange={e => setCode(e.target.value)}
            onKeyDown={e => e.key === "Enter" && verificarCodigo()}
            style={{ fontSize: 16, letterSpacing: "0.1em", marginBottom: 4 }} />
          {codeError && <p style={{ fontSize: 13, color: "red", marginBottom: 12, marginTop: 4 }}>{codeError}</p>}
          <button style={{ ...btnD, marginTop: 16 }} onClick={verificarCodigo}>Ingresar →</button>
          <p style={{ fontSize: 11, color: "#999", textAlign: "center", marginTop: 12 }}>¿No tenés código? <a href="https://mpago.la/2GtfXSt" style={{ color: "#1a1a1a" }}>Obtené tu acceso acá →</a></p>
        </div>
      </div>
    </div>
  );

  if (step === "nombre") return (
    <div style={{ ...w, minHeight: "100vh", display: "flex", alignItems: "center" }}>
      <div style={{ width: "100%" }}>
        <div style={{ background: "#1a1a1a", borderRadius: 12, padding: "2rem", marginBottom: "1rem", textAlign: "center" }}>
          <i className="ti ti-sparkles" style={{ fontSize: 32, color: "#f5c842", display: "block", marginBottom: 12 }} />
          <h1 style={{ fontSize: 22, fontWeight: 500, color: "#f5f5f0", marginTop: 0, marginBottom: 8 }}>¡Acceso desbloqueado!</h1>
          <p style={{ fontSize: 14, color: "#aaa" }}>Tu plan personalizado está a punto de generarse.</p>
        </div>
        <div style={card}>
          <label style={lbl}>¿Cómo te llamás?</label>
          <input type="text" placeholder="Tu nombre" value={nombre} onChange={e => setNombre(e.target.value)} />
          <button style={{ ...btnD, marginTop: 16, opacity: nombre ? 1 : 0.4 }} disabled={!nombre} onClick={() => setStep("scanner")}>Empezar el escáner →</button>
        </div>
      </div>
    </div>
  );

  if (step === "scanner") {
    const q = QUESTIONS[current];
    return (
      <div style={w}>
        <div style={{ height: 4, background: "rgba(0,0,0,0.1)", borderRadius: 2, marginBottom: "1.5rem" }}>
          <div style={{ height: 4, width: `${progress}%`, background: "#1a1a1a", borderRadius: 2, transition: "width 0.3s" }} />
        </div>
        <span style={{ ...lbl, color: "#888" }}>{current + 1} de {QUESTIONS.length}</span>
        <h2 style={{ fontSize: 18, fontWeight: 500, marginBottom: "1.5rem" }}>{q.text}</h2>
        {q.options.map(opt => (
          <button key={opt.value} onClick={() => setSelected(opt.value)} style={{ display: "block", width: "100%", textAlign: "left", background: selected === opt.value ? (COLORS[opt.value]?.bg || "#f0f0f0") : "#fff", border: selected === opt.value ? `1.5px solid ${COLORS[opt.value]?.border || "#333"}` : "0.5px solid rgba(0,0,0,0.15)", borderRadius: 8, padding: "14px 16px", fontSize: 14, cursor: "pointer", color: selected === opt.value ? (COLORS[opt.value]?.text || "#1a1a1a") : "#1a1a1a", marginBottom: 10, lineHeight: 1.5, fontWeight: selected === opt.value ? 500 : 400 }}>{opt.label}</button>
        ))}
        <button style={{ ...btnD, marginTop: 8, opacity: selected ? 1 : 0.4 }} disabled={!selected} onClick={handleNext}>
          {current < QUESTIONS.length - 1 ? "Siguiente →" : "Generar mi plan →"}
        </button>
      </div>
    );
  }

  if (step === "loading") return (
    <div style={{ ...w, textAlign: "center", paddingTop: "4rem" }}>
      <i className="ti ti-loader-2" style={{ fontSize: 36, color: "#888", animation: "spin 1s linear infinite" }} />
      <p style={{ fontSize: 15, color: "#888", marginTop: 16 }}>Generando tu plan personalizado, {nombre}…</p>
      <p style={{ fontSize: 13, color: "#bbb", marginTop: 8 }}>Esto puede tardar unos segundos</p>
    </div>
  );

  if (step === "resultado" && plan) return (
    <div style={w}>
      <div style={{ background: c.bg, borderRadius: 12, padding: "1.75rem", marginBottom: "1rem", border: `1px solid ${c.border}` }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6, background: c.badge, borderRadius: 8, padding: "4px 12px", fontSize: 12, fontWeight: 500, color: c.text, marginBottom: 12 }}>
          <i className={`ti ${plan.icon}`} style={{ fontSize: 13 }} />{plan.perfil}
        </span>
        <h1 style={{ fontSize: 22, fontWeight: 500, color: c.text, marginTop: 0, marginBottom: 8 }}>{plan.titulo}</h1>
        {aiResult && <div style={{ background: "rgba(255,255,255,0.6)", borderRadius: 8, padding: "12px 16px", fontSize: 14, fontStyle: "italic", color: c.text, lineHeight: 1.7 }}>{aiResult.bienvenida}</div>}
      </div>

      {aiResult && <>
        <div style={card}>
          <span style={lbl}>Tu propuesta de valor</span>
          <div style={{ background: c.bg, borderLeft: `3px solid ${c.border}`, borderRadius: "0 8px 8px 0", padding: "12px 16px", fontSize: 14, fontStyle: "italic", color: c.text, lineHeight: 1.7, marginTop: 8 }}>{aiResult.propuesta_valor}</div>
        </div>

        <div style={card}>
          <span style={lbl}>Tu plan de 15 días — paso a paso</span>
          {aiResult.pasos.map((p, i) => (
            <div key={p.numero} style={{ display: "flex", gap: 14, marginBottom: i < 4 ? 20 : 0, alignItems: "flex-start", marginTop: 16 }}>
              <div style={{ minWidth: 30, height: 30, borderRadius: "50%", background: c.bg, border: `1.5px solid ${c.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 500, color: c.text, flexShrink: 0 }}>{p.numero}</div>
              <div style={{ paddingTop: 4 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                  <p style={{ fontSize: 14, fontWeight: 500, margin: 0 }}>{p.titulo}</p>
                  <span style={{ fontSize: 11, color: "#999", background: "#f5f5f3", borderRadius: 4, padding: "2px 8px" }}>⏱ {p.tiempo_estimado}</span>
                </div>
                <p style={{ fontSize: 13, lineHeight: 1.7, color: "#555", margin: 0 }}>{p.detalle}</p>
              </div>
            </div>
          ))}
        </div>

        <div style={{ background: c.bg, border: `1px solid ${c.border}`, borderRadius: 12, padding: "1.5rem 1.75rem", marginBottom: "1rem" }}>
          <span style={{ ...lbl, color: c.accent }}>Tu script para el primer cliente</span>
          <div style={{ background: "rgba(255,255,255,0.6)", borderRadius: 8, padding: "1rem 1.25rem", fontSize: 14, lineHeight: 1.8, color: c.text, whiteSpace: "pre-wrap", marginTop: 8 }}>{aiResult.script}</div>
        </div>

        <div style={card}>
          <span style={lbl}>Tu cliente ideal</span>
          <p style={{ fontSize: 14, lineHeight: 1.7, marginTop: 8, marginBottom: 16 }}>{aiResult.primer_cliente}</p>
          <span style={lbl}>Tu meta — próximos 7 días</span>
          <p style={{ fontSize: 14, lineHeight: 1.7, marginTop: 8, marginBottom: 0 }}>{aiResult.meta_7_dias}</p>
        </div>

        <div style={{ background: "#1a1a1a", borderRadius: 12, padding: "1.5rem", marginBottom: "1rem", textAlign: "center" }}>
          <p style={{ fontSize: 16, fontWeight: 500, color: "#f5f5f0", lineHeight: 1.7, margin: 0 }}>"{aiResult.frase_cierre}"</p>
        </div>
      </>}

      {!aiResult && (
        <div style={card}>
          <p style={{ fontSize: 14, color: "#888", fontStyle: "italic" }}>No se pudo generar el plan. Intentá de nuevo.</p>
          <button style={{ ...btnD, marginTop: 12 }} onClick={() => { setStep("scanner"); setCurrent(0); setRespuestas({}); }}>Intentar de nuevo</button>
        </div>
      )}

      <button style={btnO} onClick={() => { setStep("acceso"); setCurrent(0); setRespuestas({}); setPerfil(null); setPlan(null); setAiResult(null); setNombre(""); setCode(""); }}>Volver al inicio</button>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
