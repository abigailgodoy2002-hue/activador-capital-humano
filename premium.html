          { nombre: "Google Calendar", link: "https://calendar.google.com", desc: "Para mostrar gestión de agenda integrada" },
        ],
        tiempo: "3 horas"

      {

        detalle: "Ofrecé 3 paquetes claros: Starter (5 hs/sem: gestión de agenda, respuesta de emails, coordinación básica): USD 150-200/mes. Estándar (10 hs/sem: agenda + coordinación de proyectos + reportes semanales + gestión de redes): USD 250-350/mes. Premium (20 hs/sem: gestión completa del negocio + soporte diario): USD 400-600/mes. Siempre ofrecé 1 semana de prueba gratuita para cerrar.",
        herramientas: [
          { nombre: "Canva — Propuesta de servicios", link: "https://canva.com", desc: "Presentación visual de tus paquetes" },
          { nombre: "Notion — Contrato simple", link: "https://notion.so/templates", desc: "Plantillas de contratos freelance" },
        ],
        tiempo: "1 hora"
      },
      {
        numero: 4, titulo: "Encontrá y contactá profesionales desbordados",
        detalle: "Tu cliente ideal muestra señales claras en redes: 'agenda completa hasta X', 'lista de espera abierta', 'no tengo más turnos este mes'. Buscalos en LinkedIn (coaches, consultores, psicólogos, diseñadores freelance) e Instagram (misma búsqueda por hashtag de su profesión). También buscá en grupos de Facebook de coaches y terapeutas. Si tienen buena reputación pero publican poco, están desbordados.",
        herramientas: [
          { nombre: "LinkedIn", link: "https://linkedin.com", desc: "Buscá 'coach independiente' o 'consultor freelance'" },
          { nombre: "Facebook Groups", link: "https://facebook.com/groups", desc: "Buscá 'coaches Argentina' o 'consultores online'" },
        ],
        tiempo: "1 hora por día"
      },
      {
        numero: 5, titulo: "Semana de prueba gratuita → cliente fijo",
        detalle: "Ofrecé trabajar 1 semana gratis gestionando su agenda y tareas más urgentes. Durante esa semana: configurá su sistema en Notion o Trello, organizá su agenda de la próxima semana, respondé sus emails o mensajes pendientes, entregá un reporte al final. Al cierre de la semana mostrales el reporte: cuántas horas ahorraron, cuántas tareas completaron, qué hubiera quedado sin hacer. El 80% de quienes aceptan la prueba se convierten en clientes fijos.",
        herramientas: [
          { nombre: "Google Workspace (Gmail + Drive + Calendar)", link: "https://workspace.google.com", desc: "Gratis — para gestionar todo del cliente" },
          { nombre: "Calendly", link: "https://calendly.com", desc: "Para gestionar agenda del cliente gratis" },
        ],
        tiempo: "5-10 horas esa semana"
      },
    ],
    mensajes: [
      { titulo: "Primer mensaje a prospecto", texto: "Hola [Nombre]! Vi tu trabajo como [profesión] — impresionante lo que lográs. Soy [tu nombre], Asistente Virtual especializada en coordinación de proyectos y gestión de agenda para profesionales independientes. Te propongo una semana de prueba sin costo para que veas cómo trabajo. ¿Tenés 15 minutos para contarme qué necesitás?" },
      { titulo: "Durante la reunión de diagnóstico", texto: "Contame, en un día típico: ¿cuánto tiempo dedicás a responder mensajes, coordinar reuniones y hacer seguimiento de tareas? [Escuchá]. ¿Y cuánto de ese tiempo podrías dedicar a tus clientes si alguien más lo hiciera? Eso es exactamente lo que hago." },
      { titulo: "Cierre al final de la semana de prueba", texto: "Hola [Nombre]! Te mando el reporte de la semana: organicé [X] tareas, coordiné [Y] reuniones y respondí [Z] mensajes. Eso representó aproximadamente [N] horas de tu tiempo. ¿Seguimos el mes que viene con el paquete [nombre]?" },
    ],
    precios: {
      titulo: "Cómo cobrar",
      items: [
        "Starter (5 hs/sem): USD 150-200/mes",
        "Estándar (10 hs/sem): USD 250-350/mes",

        "Cobrar el mes por adelantado antes de empezar",

        "Siempre ofrecé 1 semana de prueba gratuita para cerrar",
      ]
    },
    frase: "El caos que vos ves como obvio de resolver, para tu cliente es una carga diaria que lo agota. Vos sos la solución que están buscando."

function calcularPerfil(r) {
  const c = { empatia: 0, analitico: 0, comunicador: 0, organizador: 0 };
  ["q1","q2","q3","q4","q5"].forEach(k => { if (r[k] && c[r[k]] !== undefined) c[r[k]]++; });
  return Object.entries(c).sort((a, b) => b[1] - a[1])[0][0];
}

function App() {
  const [step, setStep] = React.useState("acceso");
  const [code, setCode] = React.useState("");
  const [codeError, setCodeError] = React.useState("");
  const [current, setCurrent] = React.useState(0);
  const [respuestas, setRespuestas] = React.useState({});
  const [selected, setSelected] = React.useState(null);
  const [perfil, setPerfil] = React.useState(null);
  const [plan, setPlan] = React.useState(null);
  const [planPremium, setPlanPremium] = React.useState(null);
  const [nombre, setNombre] = React.useState("");

  const c = perfil ? COLORS[perfil] : COLORS.analitico;

  const verificarCodigo = () => {
    if (code.trim().toUpperCase() === ACCESS_CODE) { setStep("nombre"); setCodeError(""); }
    else setCodeError("Código incorrecto. Verificá que lo hayas copiado bien.");
  };

  const handleNext = () => {
    if (!selected) return;
    const newResp = { ...respuestas, [QUESTIONS[current].id]: selected };
    setRespuestas(newResp);
    setSelected(null);
    if (current < QUESTIONS.length - 1) { setCurrent(current + 1); }
    else {
      const p = calcularPerfil(newResp);
      setPerfil(p);
      setPlan(PLANS[p]);
      setPlanPremium(PLANES_PREMIUM[p]);
      setStep("resultado");
    }
  };

  const progress = Math.round((current / QUESTIONS.length) * 100);
  const w = { maxWidth: 640, margin: "0 auto", padding: "2rem 1rem" };
  const card = { background: "#fff", border: "0.5px solid rgba(0,0,0,0.12)", borderRadius: 12, padding: "1.5rem 1.75rem", marginBottom: "1rem" };
  const lbl = { fontSize: 11, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8, display: "block" };
  const btnD = (bg) => ({ background: bg || "#1a1a1a", border: "none", borderRadius: 8, padding: "12px 28px", fontSize: 15, fontWeight: 500, cursor: "pointer", color: "#fff", width: "100%" });
  const btnO = { background: "transparent", border: "0.5px solid rgba(0,0,0,0.25)", borderRadius: 8, padding: "11px 28px", fontSize: 14, cursor: "pointer", color: "#1a1a1a", width: "100%", marginTop: 10 };

  if (step === "acceso") return (
    <div style={{ ...w, minHeight: "100vh", display: "flex", alignItems: "center" }}>
      <div style={{ width: "100%" }}>
        <div style={{ background: "#1a1a1a", borderRadius: 12, padding: "2rem", marginBottom: "1rem", textAlign: "center" }}>
          <i className="ti ti-lock-open" style={{ fontSize: 32, color: "#f5c842", display: "block", marginBottom: 12 }} />
          <h1 style={{ fontSize: 24, fontWeight: 500, color: "#f5f5f0", marginTop: 0, marginBottom: 8 }}>Plan Premium</h1>
          <p style={{ fontSize: 14, color: "#aaa", lineHeight: 1.7 }}>Ingresá tu código de acceso para desbloquear tu plan de negocios completo.</p>
        </div>
        <div style={card}>
          <label style={lbl}>Código de acceso</label>
          <input type="text" placeholder="Tu código" value={code} onChange={e => setCode(e.target.value)}
            onKeyDown={e => e.key === "Enter" && verificarCodigo()}
            style={{ fontSize: 16, letterSpacing: "0.1em", marginBottom: 4 }} />
          {codeError && <p style={{ fontSize: 13, color: "red", marginBottom: 12, marginTop: 4 }}>{codeError}</p>}
          <button style={{ ...btnD(), marginTop: 16 }} onClick={verificarCodigo}>Ingresar →</button>
          <p style={{ fontSize: 11, color: "#999", textAlign: "center", marginTop: 12 }}>¿No tenés código? <a href="https://mpago.la/2GtfXSt" style={{ color: "#1a1a1a", fontWeight: 500 }}>Obtené tu acceso por USD 25 →</a></p>
        </div>
      </div>
    </div>
  );

  if (step === "nombre") return (
    <div style={{ ...w, minHeight: "100vh", display: "flex", alignItems: "center" }}>
      <div style={{ width: "100%" }}>
        <div style={{ background: "#1a1a1a", borderRadius: 12, padding: "2rem", marginBottom: "1rem", textAlign: "center" }}>
          <i className="ti ti-sparkles" style={{ fontSize: 32, color: "#f5c842", display: "block", marginBottom: 12 }} />
          <h1 style={{ fontSize: 22, fontWeight: 500, color: "#f5f5f0", marginTop: 0, marginBottom: 8 }}>¡Acceso desbloqueado!</h1>
          <p style={{ fontSize: 14, color: "#aaa" }}>Tu plan de negocios personalizado está a punto de generarse.</p>
        </div>
        <div style={card}>
          <label style={lbl}>¿Cómo te llamás?</label>
          <input type="text" placeholder="Tu nombre" value={nombre} onChange={e => setNombre(e.target.value)} />
          <button style={{ ...btnD(), marginTop: 16, opacity: nombre ? 1 : 0.4 }} disabled={!nombre} onClick={() => setStep("scanner")}>Empezar el escáner →</button>
        </div>
      </div>
    </div>
  );

  if (step === "scanner") {
    const q = QUESTIONS[current];
    return (
      <div style={w}>
        <div style={{ height: 4, background: "rgba(0,0,0,0.1)", borderRadius: 2, marginBottom: "1.5rem" }}>
          <div style={{ height: 4, width: `${progress}%`, background: "#1a1a1a", borderRadius: 2, transition: "width 0.3s" }} />
        </div>
        <span style={{ ...lbl, color: "#888" }}>{current + 1} de {QUESTIONS.length}</span>
        <h2 style={{ fontSize: 18, fontWeight: 500, marginBottom: "1.5rem" }}>{q.text}</h2>
        {q.options.map(opt => (
          <button key={opt.value} onClick={() => setSelected(opt.value)} style={{ display: "block", width: "100%", textAlign: "left", background: selected === opt.value ? (COLORS[opt.value]?.bg || "#f0f0f0") : "#fff", border: selected === opt.value ? `1.5px solid ${COLORS[opt.value]?.border || "#333"}` : "0.5px solid rgba(0,0,0,0.15)", borderRadius: 8, padding: "14px 16px", fontSize: 14, cursor: "pointer", color: selected === opt.value ? (COLORS[opt.value]?.text || "#1a1a1a") : "#1a1a1a", marginBottom: 10, lineHeight: 1.5, fontWeight: selected === opt.value ? 500 : 400 }}>{opt.label}</button>
        ))}
        <button style={{ ...btnD(), marginTop: 8, opacity: selected ? 1 : 0.4 }} disabled={!selected} onClick={handleNext}>
          {current < QUESTIONS.length - 1 ? "Siguiente →" : "Ver mi plan completo →"}
        </button>
      </div>
    );
  }

  if (step === "resultado" && plan && planPremium) return (
    <div style={w}>
      <div style={{ background: c.bg, borderRadius: 12, padding: "1.75rem", marginBottom: "1rem", border: `1px solid ${c.border}` }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6, background: c.badge, borderRadius: 8, padding: "4px 12px", fontSize: 12, fontWeight: 500, color: c.text, marginBottom: 12 }}>
          <i className={`ti ${plan.icon}`} style={{ fontSize: 13 }} />{plan.perfil}
        </span>
        <h1 style={{ fontSize: 22, fontWeight: 500, color: c.text, marginTop: 0, marginBottom: 8 }}>{plan.titulo}</h1>
        <p style={{ fontSize: 15, lineHeight: 1.7, color: c.accent, marginBottom: 12 }}>Hola {nombre}, este es tu plan completo y personalizado para empezar a generar ingresos en los próximos 15 días.</p>
        <div style={{ background: "rgba(255,255,255,0.6)", borderRadius: 8, padding: "12px 16px", fontSize: 14, fontStyle: "italic", color: c.text, lineHeight: 1.7 }}>{planPremium.propuesta}</div>
      </div>

      <div style={card}>
        <span style={lbl}>Tu plan paso a paso — con herramientas y tiempos exactos</span>
        {planPremium.pasos.map((p, i) => (
          <div key={p.numero} style={{ borderTop: i > 0 ? "0.5px solid rgba(0,0,0,0.08)" : "none", paddingTop: i > 0 ? 20 : 16, marginTop: i > 0 ? 20 : 8 }}>
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 10 }}>
              <div style={{ minWidth: 30, height: 30, borderRadius: "50%", background: c.bg, border: `1.5px solid ${c.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 600, color: c.text, flexShrink: 0 }}>{p.numero}</div>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <p style={{ fontSize: 14, fontWeight: 600, margin: 0 }}>{p.titulo}</p>
                  <span style={{ fontSize: 11, color: "#999", background: "#f5f5f3", borderRadius: 4, padding: "2px 8px", flexShrink: 0 }}>⏱ {p.tiempo}</span>
                </div>
              </div>
            </div>
            <p style={{ fontSize: 13, lineHeight: 1.8, color: "#444", marginBottom: 12, paddingLeft: 42 }}>{p.detalle}</p>
            {p.herramientas && p.herramientas.length > 0 && (
              <div style={{ paddingLeft: 42 }}>
                <p style={{ fontSize: 11, color: "#888", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>Herramientas para este paso:</p>
                {p.herramientas.map(h => (
                  <a key={h.nombre} href={h.link} target="_blank" rel="noopener noreferrer" style={{ display: "flex", alignItems: "center", gap: 8, background: c.bg, border: `0.5px solid ${c.border}`, borderRadius: 8, padding: "8px 12px", marginBottom: 6, textDecoration: "none" }}>
                    <i className="ti ti-external-link" style={{ fontSize: 13, color: c.accent, flexShrink: 0 }} />
                    <div>
                      <p style={{ fontSize: 13, fontWeight: 500, color: c.text, margin: 0 }}>{h.nombre}</p>
                      <p style={{ fontSize: 11, color: c.accent, margin: 0 }}>{h.desc}</p>
                    </div>
                  </a>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      <div style={{ background: c.bg, border: `1px solid ${c.border}`, borderRadius: 12, padding: "1.5rem 1.75rem", marginBottom: "1rem" }}>
        <span style={{ ...lbl, color: c.accent }}>Plantillas de mensajes listas para usar</span>
        {planPremium.mensajes.map((m, i) => (
          <div key={i} style={{ marginTop: 16, borderTop: i > 0 ? `0.5px solid ${c.border}` : "none", paddingTop: i > 0 ? 16 : 0 }}>
            <p style={{ fontSize: 12, fontWeight: 600, color: c.text, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>{m.titulo}</p>
            <div style={{ background: "rgba(255,255,255,0.65)", borderRadius: 8, padding: "12px 14px", fontSize: 13, lineHeight: 1.8, color: c.text, whiteSpace: "pre-wrap" }}>{m.texto}</div>
          </div>
        ))}
      </div>

      <div style={card}>
        <span style={lbl}>{planPremium.precios.titulo}</span>
        {planPremium.precios.items.map((item, i) => (
          <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", marginTop: 10 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: c.border, flexShrink: 0, marginTop: 6 }} />
            <p style={{ fontSize: 13, lineHeight: 1.6, color: "#444", margin: 0 }}>{item}</p>
          </div>
        ))}
      </div>

      <div style={{ background: "#1a1a1a", borderRadius: 12, padding: "1.5rem", marginBottom: "1rem", textAlign: "center" }}>
        <p style={{ fontSize: 16, fontWeight: 500, color: "#f5f5f0", lineHeight: 1.7, margin: 0 }}>"{planPremium.frase}"</p>
      </div>

      <button style={btnO} onClick={() => { setStep("acceso"); setCurrent(0); setRespuestas({}); setPerfil(null); setPlan(null); setPlanPremium(null); setNombre(""); setCode(""); }}>Volver al inicio</button>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
